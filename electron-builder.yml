appId: com.novastory.app
productName: Nova Story
copyright: MIT

directories:
    output: release
    buildResources: build

files:
    - dist/main/**/*
    - dist/renderer/**/*
    - package.json

asar: true

extraMetadata:
    main: dist/main/main/index.js

linux:
    target:
        - AppImage
        - deb
    category: Office
    icon: build/icon.png

mac:
    target:
        - dmg
    category: public.app-category.productivity

win:
    target:
        - portable
        - zip
    icon: build/icon.ico
    signAndEditExecutable: false
